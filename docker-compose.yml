services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kirkalab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kirkalab}
      POSTGRES_DB: ${POSTGRES_DB:-kirkalab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kirkalab} -d ${POSTGRES_DB:-kirkalab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kirkalab}:${POSTGRES_PASSWORD:-kirkalab}@db:5432/${POSTGRES_DB:-kirkalab}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_BASE_URL: http://app:8000
    depends_on:
      - app

volumes:
  postgres_data:
